name: Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "tbrc-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target
          key: windows-msi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Bundle uv sidecar
        shell: bash
        env:
          UV_VERSION: "0.11.7"
          TRIPLE: x86_64-pc-windows-msvc
        run: |
          set -euo pipefail
          mkdir -p frontend/src-tauri/binaries
          WORK=$(mktemp -d)
          URL="https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-${TRIPLE}.zip"
          curl -fsSL "$URL" -o "$WORK/uv.zip"
          unzip -j -o "$WORK/uv.zip" -d "$WORK"
          mv "$WORK/uv.exe" "frontend/src-tauri/binaries/uv-${TRIPLE}.exe"

      - name: Bundle ffmpeg sidecars
        shell: bash
        env:
          TRIPLE: x86_64-pc-windows-msvc
          FFMPEG_BTBN_VERSION: latest
        run: |
          set -euo pipefail
          BINDIR="frontend/src-tauri/binaries"
          mkdir -p "$BINDIR"
          WORK=$(mktemp -d)
          URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_BTBN_VERSION}/ffmpeg-master-${FFMPEG_BTBN_VERSION}-win64-gpl.zip"
          curl -fsSL "$URL" -o "$WORK/ffmpeg.zip"
          unzip -o "$WORK/ffmpeg.zip" -d "$WORK"
          EXTRACTED=$(find "$WORK" -type f -name "ffmpeg.exe" | head -1)
          EXTRACTED_DIR=$(dirname "$EXTRACTED")
          mv "$EXTRACTED_DIR/ffmpeg.exe" "$BINDIR/ffmpeg-${TRIPLE}.exe"
          mv "$EXTRACTED_DIR/ffprobe.exe" "$BINDIR/ffprobe-${TRIPLE}.exe"

      - name: Disable updater artifacts for unsigned test installer
        shell: pwsh
        run: |
          $path = "frontend/src-tauri/tauri.conf.json"
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json.bundle.createUpdaterArtifacts = $false
          $json.bundle.targets = @("msi")
          $json | ConvertTo-Json -Depth 20 | Set-Content -Path $path -Encoding UTF8

      - name: Build Windows MSI
        working-directory: frontend
        run: bun run tauri build --target x86_64-pc-windows-msvc --bundles msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbrc-studio-windows-msi
          path: frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/tbrc-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "TBRC Studio ${{ github.ref_name }}"
          prerelease: true
          files: frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
